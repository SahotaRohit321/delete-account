<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volyre - Account Deletion Request</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1c1f26;
            --text-main: #f8f9fa;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #272a30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .description {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        input::placeholder {
            color: #52525b;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">VOLYRE</div>
    <div class="description">Submit a request to permanently delete your account and associated data.</div>
    
    <form id="deletionForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Enter your Volyre username">
        </div>
        
        <div class="form-group">
            <label for="email">Registered Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        
        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
    document.getElementById('deletionForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent page reload
        
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        
        if (username && email) {
            const mailtoAddress = "support.volyre@gmail.com";
            const subject = encodeURIComponent("Account Deletion Request - " + username);
            const body = encodeURIComponent(
                "Hello Volyre Support,\n\n" +
                "I would like to request the permanent deletion of my account and all associated data from the platform.\n\n" +
                "Account Details:\n" +
                "- Username: " + username + "\n" +
                "- Email: " + email + "\n\n" +
                "Please confirm via email once the deletion process has been completed.\n\n" +
                "Thank you."
            );
            
            // Redirect to email client
            window.location.href = "mailto:" + mailtoAddress + "?subject=" + subject + "&body=" + body;
        }
    });
</script>

</body>
</html>
